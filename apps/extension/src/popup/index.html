<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tack</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink: #1c1d22;
        --muted: #6b6f76;
        --line: #e4e5e9;
        --accent: #5b4bff;
        --danger: #b4232a;
        --surface: #ffffff;
        --surface-2: #f5f5f7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #ececf0;
          --muted: #9a9ea6;
          --line: #2c2d33;
          --surface: #17181c;
          --surface-2: #1f2026;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 300px;
        padding: 14px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter,
          sans-serif;
        color: var(--ink);
        background: var(--surface);
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field span {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input {
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-2);
        color: var(--ink);
        font-size: 13px;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
      }
      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }
      button {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
      }
      button.danger {
        background: transparent;
        color: var(--danger);
        border-color: var(--line);
      }
      hr {
        border: none;
        border-top: 1px solid var(--line);
        margin: 2px 0;
      }
      .site {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      code {
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        font-size: 12px;
        word-break: break-all;
      }
      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 11px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./popup.js"></script>
  </body>
</html>
