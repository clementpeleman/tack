services:
  tack:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - tack-data:/data
    environment:
      DATABASE_URL: /data/tack.db
      SCREENSHOTS_DIR: /data/screenshots
      TACK_DEPLOYMENT: selfhost
      PORT: 3000
      # Public URL of this instance. Set this behind a reverse proxy so the
      # widget embed snippet and magic links use https + your real domain:
      # TACK_PUBLIC_URL: https://tack.yourdomain.com
      # First launch: open the app and claim the instance with your email —
      # no email provider needed. Open signup for additional accounts stays
      # off on self-host unless you set:
      # TACK_ALLOW_SIGNUP: "true"
      # Email (pick one provider):
      # RESEND_API_KEY: re_...
      # RESEND_FROM: "Tack <notifications@yourdomain.com>"
      # SMTP_HOST: mailpit
      # SMTP_PORT: 1025
      # SMTP_FROM: "Tack <noreply@tack.local>"
      # AI Inbox (optional):
      # TACK_AI_ENABLED: "true"
      # OPENAI_API_KEY: sk-...

volumes:
  tack-data:
